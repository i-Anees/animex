# ANIMEX WEAR — nginx site config
# Copy to: /etc/nginx/sites-available/animex  then symlink into sites-enabled.
server {
    listen 80;
    listen [::]:80;

    # Replace with your domain, or leave _ to serve on the bare public IP.
    server_name _;

    root /var/www/animex/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Cache real static files, but fall through to Laravel for dynamic
    # routes that happen to end in .js (e.g. Livewire's livewire.min.js).
    location ~* \.(js|css|svg|woff2?|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri /index.php?$query_string;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
